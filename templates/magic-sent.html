<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>_rzilient VPN — Check your email</title>
    <link rel="icon" type="image/x-icon" href="https://resources.rzilient.tech/assets/images/rzilient-sidebar-small-logo-lime.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="card card-centered">
    <div class="logo logo-centered">
        <img src="https://resources.rzilient.tech/assets/images/rzilient-sidebar-small-logo-lime.svg" alt="_rzilient">
        <span>_rzilient<span class="accent">.vpn</span></span>
    </div>
    <div class="icon">✉</div>
    <h1>_check your <span class="accent">email</span></h1>
    <p class="sub">We sent a login link to</p>
    <div class="email-badge">{{ .Email }}</div>
    <p class="note">The link expires in 1 hour.<br>If you don't see it, check your spam folder.</p>
    <a href="/auth/magic" class="btn-resend">← send again</a>
    <a href="/auth/login" class="btn-back">use Google instead</a>
</div>
</body>
</html>
