<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="manifest" href="/manifest.json">
    <title>Access Denied — _rzilient VPN</title>
    <link rel="icon" type="image/x-icon" href="https://resources.rzilient.tech/assets/images/rzilient-sidebar-small-logo-lime.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/unauthorized.css">
</head>
<body>

<div class="grid-bg"></div>

<div class="card">
    <div class="icon">🚫</div>
    <div class="label">// access denied</div>
    <h1>_unauthorized</h1>
    <div class="email">{{ .Email }}</div>
    <p>This account is not authorized to access the rzilient VPN portal.</p>
    <p>Only <span class="domain-badge">{{ .Domains }}</span> accounts are allowed.</p>
    <a href="/auth/login" class="btn">← try another account</a>
</div>

</body>
</html>
