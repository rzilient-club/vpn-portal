<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied — _rzilient VPN</title>
    <link rel="icon" type="image/x-icon" href="https://resources.rzilient.tech/assets/images/rzilient-sidebar-small-logo-lime.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime:       #B4EA1F;
            --lime-dim:   rgba(180, 234, 31, 0.12);
            --bg:         #0a0a0a;
            --surface:    #111111;
            --surface-2:  #1a1a1a;
            --border:     #222222;
            --text:       #e8e8e8;
            --text-dim:   #888888;
            --text-muted: #555555;
            --red:        #ef4444;
            --mono:       'JetBrains Mono', ui-monospace, monospace;
            --sans:       'Work Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                    linear-gradient(var(--border) 1px, transparent 1px),
                    linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 20%, transparent 70%);
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            animation: fadeInUp 0.4s ease-out both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--red), transparent);
            border-radius: 20px 20px 0 0;
        }

        .icon {
            width: 56px;
            height: 56px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 24px;
        }

        .label {
            font-family: var(--mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            color: var(--red);
        }

        .email {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--text-muted);
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 16px;
        }

        p {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 8px;
        }

        .domain-badge {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--lime);
            background: var(--lime-dim);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 28px;
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.2s ease;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            color: var(--lime);
            border-color: rgba(180, 234, 31, 0.3);
            background: var(--lime-dim);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="grid-bg"></div>

<div class="card">
    <div class="icon">🚫</div>
    <div class="label">// access denied</div>
    <h1>_unauthorized</h1>
    <div class="email">{{ .Email }}</div>
    <p>This account is not authorized to access the rzilient VPN portal.</p>
    <p>Only <span class="domain-badge">{{ .Domains }}</span> accounts are allowed.</p>
    <a href="/auth/login" class="btn">← try another account</a>
</div>

</body>
</html>
