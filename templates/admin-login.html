<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>_rzilient VPN — Admin login</title>
    <link rel="icon" type="image/x-icon" href="https://resources.rzilient.tech/assets/images/rzilient-sidebar-small-logo-lime.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
    <div class="logo">
        <img src="https://resources.rzilient.tech/assets/images/rzilient-sidebar-small-logo-lime.svg" alt="_rzilient">
        <span>_rzilient<span class="accent">.vpn</span></span>
        <span class="badge">// admin</span>
    </div>
    <h1>_admin <span class="accent">login</span></h1>
    <p class="sub">Enter your admin token to access the panel.</p>
    {{ if .Error }}
    <div class="error">
        {{ if eq .Error "invalid_token" }}✗ Invalid token — check your ADMIN_TOKEN.
        {{ else if eq .Error "invalid_request" }}✗ Invalid request.
        {{ else }}✗ {{ .Error }}{{ end }}
    </div>
    {{ end }}
    <form method="POST" action="/admin/login">
        <div class="field">
            <label for="admin-token">Admin token</label>
            <input type="password" id="admin-token" name="token" placeholder="••••••••••••••••" autofocus required>
        </div>
        <button type="submit" class="btn">→ access admin panel</button>
    </form>
    <a href="/" class="back">← back to portal</a>
</div>
</body>
</html>
